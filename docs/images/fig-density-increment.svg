<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" width="760" height="260">
  <style>
    .t { font: 15px system-ui, Segoe UI, sans-serif; fill: #222; }
    .h { font: 18px system-ui, Segoe UI, sans-serif; font-weight: 600; fill: #0b3d6d; }
    .grid { fill: #eceff1; stroke: #b0bec5; stroke-width: 1; }
    .hot { fill: #ffcc80; stroke: #ef6c00; stroke-width: 2; }
    .dim { opacity: 0.35; }
  </style>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="20" y="34" class="h">Heuristic density increment (best_rectangle_lift)</text>
  <text x="20" y="60" class="t">Search subrectangles R; maximize |A ) R| / |R| vs global ± = |A|/|©| (lift over random).</text>
  <!-- grid -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="180" height="140" fill="none" stroke="#90a4ae" stroke-width="2"/>
    <g class="dim">
      <rect x="0" y="0" width="60" height="35" class="grid"/>
      <rect x="60" y="0" width="60" height="35" class="grid"/>
      <rect x="120" y="0" width="60" height="35" class="grid"/>
      <rect x="0" y="35" width="60" height="35" class="grid"/>
      <rect x="60" y="35" width="60" height="35" class="grid"/>
      <rect x="120" y="35" width="60" height="35" class="grid"/>
      <rect x="0" y="70" width="60" height="35" class="grid"/>
      <rect x="60" y="70" width="60" height="35" class="grid"/>
      <rect x="120" y="70" width="60" height="35" class="grid"/>
      <rect x="0" y="105" width="60" height="35" class="grid"/>
      <rect x="60" y="105" width="60" height="35" class="grid"/>
      <rect x="120" y="105" width="60" height="35" class="grid"/>
    </g>
    <!-- highlighted rectangle bottom-right 2x2 -->
    <rect x="120" y="105" width="60" height="35" class="hot"/>
    <rect x="60" y="105" width="60" height="35" class="hot"/>
    <rect x="120" y="70" width="60" height="35" class="hot"/>
    <rect x="60" y="70" width="60" height="35" class="hot"/>
  </g>
  <text x="300" y="120" class="t">Not the full Theorem 3.4 sifting proof</text>
  <text x="300" y="148" class="t">a brute-force where is the mass? zoom for demos.</text>
</svg>
