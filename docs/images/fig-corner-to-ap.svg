<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="20" y="36" fill="#0b3d6d" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold">Corner in grid maps to 3-term AP on line</text>
  <text x="20" y="64" fill="#333333" font-family="Arial,Helvetica,sans-serif" font-size="14">Lift: (x,y) in A iff z=x+2y in S. Corner (x,y),(x+d,y),(x,y+d) maps to z, z+d, z+2d.</text>
  <line x1="60" y1="220" x2="260" y2="220" stroke="#444444" stroke-width="1.5"/>
  <line x1="60" y1="220" x2="60" y2="100" stroke="#444444" stroke-width="1.5"/>
  <text x="250" y="242" fill="#1a1a1a" font-family="Arial,Helvetica,sans-serif" font-size="16">x</text>
  <text x="42" y="108" fill="#1a1a1a" font-family="Arial,Helvetica,sans-serif" font-size="16">y</text>
  <circle cx="120" cy="180" r="9" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
  <circle cx="200" cy="180" r="9" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
  <circle cx="120" cy="120" r="9" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
  <line x1="120" y1="180" x2="200" y2="180" stroke="#1565c0" stroke-width="2.5"/>
  <line x1="120" y1="180" x2="120" y2="120" stroke="#1565c0" stroke-width="2.5"/>
  <text x="108" y="200" fill="#1a1a1a" font-family="Arial,Helvetica,sans-serif" font-size="16">(x,y)</text>
  <text x="188" y="200" fill="#1a1a1a" font-family="Arial,Helvetica,sans-serif" font-size="16">(x+d,y)</text>
  <text x="72" y="128" fill="#1a1a1a" font-family="Arial,Helvetica,sans-serif" font-size="16">(x,y+d)</text>
  <line x1="280" y1="150" x2="392" y2="150" stroke="#555555" stroke-width="2"/>
  <polygon points="400,150 390,145 390,155" fill="#555555"/>
  <text x="292" y="140" fill="#333333" font-family="Arial,Helvetica,sans-serif" font-size="14">same d</text>
  <line x1="420" y1="150" x2="680" y2="150" stroke="#444444" stroke-width="1.5"/>
  <circle cx="480" cy="150" r="8" fill="#2e7d32" stroke="#ffffff" stroke-width="2"/>
  <circle cx="540" cy="150" r="8" fill="#2e7d32" stroke="#ffffff" stroke-width="2"/>
  <circle cx="600" cy="150" r="8" fill="#2e7d32" stroke="#ffffff" stroke-width="2"/>
  <text x="468" y="178" fill="#1a1a1a" font-family="Arial,Helvetica,sans-serif" font-size="16">z</text>
  <text x="528" y="178" fill="#1a1a1a" font-family="Arial,Helvetica,sans-serif" font-size="16">z+d</text>
  <text x="580" y="178" fill="#1a1a1a" font-family="Arial,Helvetica,sans-serif" font-size="16">z+2d</text>
  <text x="420" y="200" fill="#333333" font-family="Arial,Helvetica,sans-serif" font-size="14">If S has no 3-AP, no corner in A for this lift.</text>
</svg>
