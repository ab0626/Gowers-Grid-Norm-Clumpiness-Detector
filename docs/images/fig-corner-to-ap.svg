<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <defs>
    <style>
      .t { font: 16px system-ui, Segoe UI, sans-serif; fill: #1a1a1a; }
      .s { font: 14px system-ui, Segoe UI, sans-serif; fill: #333; }
      .h { font: 18px system-ui, Segoe UI, sans-serif; font-weight: 600; fill: #0b3d6d; }
      .pt { fill: #c62828; stroke: #fff; stroke-width: 2; }
      .ln { stroke: #1565c0; stroke-width: 2.5; fill: none; }
      .ax { stroke: #444; stroke-width: 1.5; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="20" y="36" class="h">Corner in the plane ? 3-term AP on the line</text>
  <text x="20" y="64" class="s">Lift: (x,y) ? A iff z = x + 2y ? S. A corner (x,y), (x+d,y), (x,y+d) maps to z, z+d, z+2d.</text>
  <line x1="60" y1="220" x2="260" y2="220" class="ax"/>
  <line x1="60" y1="220" x2="60" y2="100" class="ax"/>
  <text x="250" y="242" class="t">x</text>
  <text x="42" y="108" class="t">y</text>
  <circle cx="120" cy="180" r="9" class="pt"/>
  <circle cx="200" cy="180" r="9" class="pt"/>
  <circle cx="120" cy="120" r="9" class="pt"/>
  <line x1="120" y1="180" x2="200" y2="180" class="ln"/>
  <line x1="120" y1="180" x2="120" y2="120" class="ln"/>
  <text x="108" y="200" class="t">(x,y)</text>
  <text x="188" y="200" class="t">(x+d,y)</text>
  <text x="72" y="128" class="t">(x,y+d)</text>
  <path d="M 280 150 L 400 150" stroke="#555" stroke-width="2" marker-end="url(#m)"/>
  <text x="292" y="140" class="s">same d</text>
  <line x1="420" y1="150" x2="680" y2="150" class="ax"/>
  <circle cx="480" cy="150" r="8" fill="#2e7d32" stroke="#fff" stroke-width="2"/>
  <circle cx="540" cy="150" r="8" fill="#2e7d32" stroke="#fff" stroke-width="2"/>
  <circle cx="600" cy="150" r="8" fill="#2e7d32" stroke="#fff" stroke-width="2"/>
  <text x="468" y="178" class="t">z</text>
  <text x="528" y="178" class="t">z+d</text>
  <text x="580" y="178" class="t">z+2d</text>
  <text x="420" y="200" class="s">If S has no 3-AP, no corner in A for this lift.</text>
</svg>
