<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="20" y="34" fill="#0b3d6d" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold">K(2,2) complete bipartite / box norm G(2,2)</text>
  <text x="20" y="58" fill="#222222" font-family="Arial,Helvetica,sans-serif" font-size="15">Left: x1,x2 (rows). Right: y1,y2 (cols). Four edges = four factors in the product.</text>
  <circle cx="120" cy="120" r="22" fill="#1565c0" stroke="#ffffff" stroke-width="2"/>
  <circle cx="120" cy="220" r="22" fill="#1565c0" stroke="#ffffff" stroke-width="2"/>
  <text x="102" y="126" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="15">x1</text>
  <text x="102" y="226" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="15">x2</text>
  <circle cx="520" cy="120" r="22" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
  <circle cx="520" cy="220" r="22" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
  <text x="504" y="126" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="15">y1</text>
  <text x="504" y="226" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="15">y2</text>
  <line x1="142" y1="120" x2="498" y2="120" stroke="#90a4ae" stroke-width="1.2"/>
  <line x1="142" y1="120" x2="498" y2="220" stroke="#90a4ae" stroke-width="1.2"/>
  <line x1="142" y1="220" x2="498" y2="120" stroke="#90a4ae" stroke-width="1.2"/>
  <line x1="142" y1="220" x2="498" y2="220" stroke="#90a4ae" stroke-width="1.2"/>
  <text x="560" y="150" fill="#222222" font-family="Arial,Helvetica,sans-serif" font-size="14">||f||^4_G(2,2) = E[ f(x1,y1)f(x1,y2)f(x2,y1)f(x2,y2) ]</text>
</svg>
