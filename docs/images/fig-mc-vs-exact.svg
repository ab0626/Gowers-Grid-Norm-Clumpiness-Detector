<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 240" width="780" height="240">
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="20" y="34" fill="#0b3d6d" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold">Two evaluation branches</text>
  <rect x="40" y="70" width="300" height="130" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="10"/>
  <rect x="400" y="70" width="340" height="130" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" rx="10"/>
  <text x="60" y="110" fill="#222222" font-family="Arial,Helvetica,sans-serif" font-size="15">Monte Carlo (grid_norm, method=mc)</text>
  <text x="60" y="138" fill="#222222" font-family="Arial,Helvetica,sans-serif" font-size="15">Scales to large n,m,k,l</text>
  <text x="60" y="162" fill="#222222" font-family="Arial,Helvetica,sans-serif" font-size="15">Sparse alpha: many zero products, high variance</text>
  <text x="420" y="110" fill="#222222" font-family="Arial,Helvetica,sans-serif" font-size="15">Exact (grid_norm_exact / exact_g2k.py)</text>
  <text x="420" y="138" fill="#222222" font-family="Arial,Helvetica,sans-serif" font-size="15">Zero sampling noise</text>
  <text x="420" y="162" fill="#222222" font-family="Arial,Helvetica,sans-serif" font-size="15">Budget cap: n^k m^l &lt;= max_tuples</text>
</svg>
